<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MVT — Paiements Visa/Mastercard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f5;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      max-width: 640px;
      width: 100%;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 48px 40px;
      text-align: center;
    }
    h1 {
      font-size: 1.35rem;
      line-height: 1.4;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    p.subtitle {
      font-size: 0.95rem;
      color: #666;
      margin-bottom: 36px;
      line-height: 1.5;
    }
    .links {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }
    a {
      display: inline-block;
      padding: 14px 32px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: background 0.2s, transform 0.15s;
    }
    a:hover { transform: translateY(-1px); }
    a.fr {
      background: #4285f4;
      color: #fff;
    }
    a.fr:hover { background: #3367d6; }
    a.en {
      background: #fff;
      color: #4285f4;
      border: 2px solid #4285f4;
    }
    a.en:hover { background: #e8f0fe; }
    footer {
      margin-top: 36px;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <main>
    <h1>Veille technologique — Infrastructures de paiement Visa &amp; Mastercard</h1>
    <p class="subtitle">Projet MVT · B-School by BNP Paribas — Coding Factory</p>
    <div class="links">
      <a class="fr" href="fr/">Version française</a>
      <a class="en" href="en/">English version</a>
    </div>
    <footer>B-School by BNP Paribas — Coding Factory</footer>
  </main>
</body>
</html>
